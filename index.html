<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ANISH DAHAL | DevOps Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 50px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .card {
      background: white;
      color: #333;
      margin: 40px auto;
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #2a5298;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

</head>

<body>

  <header>
    <h1>🚀 Hello, I'm Anish Dahal</h1>
    <p>B.Sc Computer Science Student | DevOps Learner</p>
  </header>

  <div class="card">
    <h2>🌐 My First CI/CD Project</h2>
    <p>
      This website is automatically deployed using GitHub Actions and AWS S3.
    </p>
    <a href="#" class="btn">View Project</a>
  </div>

  <div class="card">
    <h2>⚙️ Technologies Used</h2>
    <p>GitHub Actions, AWS S3, Python (Boto3)</p>
  </div>

  <footer>
    <p>© 2026 Anish Dahal | Built with DevOps ❤️</p>
  </footer>

</body>
</html>
